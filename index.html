<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1c" />
  <title>Diamond Duel - a baseball roguelike deckbuilder</title>
  <link rel="stylesheet" href="css/styles.css?v=34" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%97%86%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div id="stage">
    <div id="app"></div>
  </div>
  <button id="menu-btn" type="button" aria-label="Menu" title="Menu"></button>
  <div id="rotate-hint">
    <div class="rh-icon" id="rh-icon"></div>
    <div class="rh-title">Please rotate your device</div>
    <div class="rh-sub">Diamond Duel is played in landscape.<br/>Turn your phone sideways to play.</div>
  </div>
  <div id="overlay" class="overlay"></div>

  <!-- animated splash (auto-dismisses; tap to skip) -->
  <div id="splash">
    <div class="splash-field"></div>
    <div class="splash-inner">
      <div class="splash-badge"><span class="splash-diamond"></span></div>
      <h1 class="splash-logo">DIAMOND<span>DUEL</span></h1>
      <div class="splash-tag">A baseball roguelike deckbuilder</div>
      <div class="splash-loading"><span></span><span></span><span></span></div>
    </div>
    <div class="splash-ball"></div>
  </div>

  <script src="js/rng.js?v=34"></script>
  <script src="js/audio.js?v=34"></script>
  <script src="js/icons.js?v=34"></script>
  <script src="js/art.js?v=34"></script>
  <script src="js/data.js?v=34"></script>
  <script src="js/engine.js?v=34"></script>
  <script src="js/app.js?v=34"></script>
</body>
</html>
